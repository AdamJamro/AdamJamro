name: Fortune

on:
  schedule:
    - cron: "0 */12 * * *"   # runs daily at midnight UTC
  workflow_dispatch:      # allow manual trigger

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: fetch fortune
        uses: lowlighter/metrics@latest
        with:
          filename: dist/metrics.plugin.fortune.svg
          base: ""
          plugin_fortune: yes

      - name: push fortune to the fortune branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: fortune
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
